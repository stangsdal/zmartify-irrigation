name: Host tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-host-tests -DZIC_HOST_TESTS=ON
      - name: Build
        run: cmake --build build-host-tests
      - name: Test
        run: ctest --test-dir build-host-tests --output-on-failure